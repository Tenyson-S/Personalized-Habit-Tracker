// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  // To avoid Windows MAX_PATH (260 chars) issues, relocate the build directory to a shorter path.
  if (System.getProperty("os.name").toLowerCase().contains("win")) {
    def drive = rootDir.absolutePath.substring(0, 2)
    if (project != rootProject) {
      project.layout.buildDirectory.set(new File("${drive}/st-build/${project.name}"))
    }
    project.afterEvaluate {
      if (project.hasProperty('android')) {
        project.android.externalNativeBuild.cmake.buildStagingDirectory = "${drive}/st-build-cxx/${project.name}"
      }
    }
  }

  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
