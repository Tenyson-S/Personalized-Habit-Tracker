services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-village}
      POSTGRES_USER: ${POSTGRES_USER:-village}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-village}
    ports:
      - "5433:5432"
    volumes:
      - village_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-village} -d ${POSTGRES_DB:-village}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    env_file:
      - .env
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  village_postgres:
